<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WordPress Bulk Editor</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>WP Bulk Editor</h1>
        <p>Apply consistent block settings in the WordPress editor.</p>
      </header>

      <section class="panel">
        <div class="rule-row">
          <label for="font-size">Make H2 =</label>
          <select id="font-size">
            <option value="">Default</option>
            <option value="Medium">Medium</option>
            <option value="xMedium" selected>xMedium</option>
            <option value="xxMedium">xxMedium</option>
            <option value="Large">Large</option>
            <option value="xLarge">xLarge</option>
            <option value="xxLarge">xxLarge</option>
          </select>
        </div>
        <button id="apply-h2">Apply to all H2 blocks</button>
        <button id="inspect-block" class="secondary" type="button">Inspect selected block</button>
      </section>

      <p id="status" role="status"></p>
      <pre id="details" hidden></pre>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
